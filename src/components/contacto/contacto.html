<main class="contacto-container">
  <div class="contacto-wrapper">
    
    <section class="contacto-info">
      <span class="sub-gold">SOPORTE AL INVOCADOR</span>
      <h2>¿TIENES PREGUNTAS?</h2>
      <p>Si has encontrado un error en la Grieta, tienes problemas con tu cuenta o quieres enviarnos tus sugerencias sobre la API de campeones, escríbenos.</p>
      
      <div class="info-items">
        <div class="info-item">
          <span class="icon">📍</span>
          <div>
            <h4>Ubicación</h4>
            <p>Región de Runaterra (Servidor EUW)</p>
          </div>
        </div>
        <div class="info-item">
          <span class="icon">✉️</span>
          <div>
            <h4>Correo de Soporte</h4>
            <p>soporte&#64;tu-api-lol.com</p>
          </div>
        </div>
      </div>
    </section>

    <section class="contacto-form-box">
      <form class="lol-form">
        
        <div class="form-group">
          <label for="nombre">Nombre de Invocador</label>
          <input type="text" id="nombre" placeholder="Ej. Faker#KR1" required>
        </div>

        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" placeholder="tu@correo.com" required>
        </div>

        <div class="form-group">
          <label for="motivo">Motivo de la consulta</label>
          <select id="motivo">
            <option value="api">Error en la API de Campeones</option>
            <option value="cuenta">Problemas con la Cuenta</option>
            <option value="feedback">Sugerencias y Feedback</option>
          </select>
        </div>

        <div class="form-group">
          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje" rows="5" placeholder="Escribe los detalles de tu consulta aquí..." required></textarea>
        </div>

        <button type="submit" class="btn-submit-lol">ENVIAR CONSULTA</button>

      </form>
    </section>

  </div>
</main>
